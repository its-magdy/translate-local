name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: darwin-arm64, bun: bun-darwin-arm64, os: macos-latest  }
          - { name: darwin-x64,   bun: bun-darwin-x64,   os: macos-15-intel }
          - { name: linux-x64,    bun: bun-linux-x64,    os: ubuntu-latest }
          - { name: linux-arm64,  bun: bun-linux-arm64,  os: ubuntu-24.04-arm }
          - { name: windows-x64,  bun: bun-windows-x64,  os: windows-latest }
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Each target builds on its native OS so platform-specific optional deps
      # (opentui, bun:sqlite) install and bundle correctly without cross-compilation hacks.
      - name: Compile binary
        shell: bash
        working-directory: apps/cli
        run: |
          mkdir -p dist
          OUT="dist/tl-${{ matrix.target.name }}"
          if [ "${{ matrix.target.name }}" = "windows-x64" ]; then
            OUT="${OUT}.exe"
          fi
          bun build --compile --minify \
            --target=${{ matrix.target.bun }} \
            ./src/index.ts \
            --outfile "$OUT"

      # Ad-hoc sign macOS binaries so Gatekeeper doesn't kill them on Apple Silicon / macOS 15+.
      # This uses the free "-s -" identity (no Apple Developer account needed).
      # Bun's JIT engine requires the entitlements below to run under the hardened runtime.
      - name: Ad-hoc codesign (macOS only)
        if: startsWith(matrix.target.name, 'darwin')
        shell: bash
        working-directory: apps/cli/dist
        run: |
          codesign \
            --entitlements "${{ github.workspace }}/scripts/entitlements.plist" \
            --force -s - \
            "tl-${{ matrix.target.name }}"
          echo "Signed tl-${{ matrix.target.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tl-${{ matrix.target.name }}
          path: apps/cli/dist/tl-${{ matrix.target.name }}*
          if-no-files-found: error

  publish-npm:
    name: publish npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage platform packages
        run: node scripts/stage-npm-packages.mjs "${GITHUB_REF_NAME#v}"

      - name: Publish platform packages
        run: |
          set -euo pipefail
          for dir in packages/npm-tl-*/; do
            (cd "$dir" && npm publish --access public --provenance) || \
              echo "Skipping $dir — already published"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package
        run: cd packages/npm-tl && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          ls -lh
          sha256sum tl-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
